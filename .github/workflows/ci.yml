name: CI

on:
  push:
  pull_request:

jobs:
  quantum:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install quantum package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "packages/quantum[dev]"
          python -m pip install -e "packages/proton_transport[dev]"
          python -m pip install -e "packages/tumor_ph[dev]"
          python -m pip install -e "packages/proton_therapy[dev]"
          python -m pip install -e "packages/hbond_onco[dev]"
          python -m pip install -e "packages/h2_therapy[dev]"
          python -m pip install -e "packages/ml_pipeline[dev]"
      - name: Test
        run: pytest packages/quantum packages/proton_transport packages/tumor_ph packages/proton_therapy packages/hbond_onco packages/h2_therapy packages/ml_pipeline
      - name: Quality
        run: |
          ruff check packages/ml_pipeline/src packages/ml_pipeline/tests
          pyright
          pytest packages/ml_pipeline --cov=hydroonc_pipeline --cov-fail-under=80
