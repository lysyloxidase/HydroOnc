[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "hydroonc-h2-therapy"
version = "0.1.0"
description = "Phase 6 molecular hydrogen therapy modeling for HydroOnc: ROS dynamics, immune ODEs, and response prediction."
readme = "README.md"
requires-python = ">=3.9"
license = { text = "MIT" }
authors = [
  { name = "HydroOnc Contributors" }
]
dependencies = [
  "numpy>=1.23"
]

[project.optional-dependencies]
dev = [
  "pytest>=7.4"
]
ml = [
  "xgboost>=2.0"
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra"
