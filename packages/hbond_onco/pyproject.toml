[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "hydroonc-hbond-onco"
version = "0.1.0"
description = "Phase 5 H-bond analysis for mutant oncoproteins and GNN-assisted drug design."
readme = "README.md"
requires-python = ">=3.9"
license = { text = "MIT" }
authors = [
  { name = "HydroOnc Contributors" }
]
dependencies = [
  "numpy>=1.23"
]

[project.optional-dependencies]
dev = [
  "pytest>=7.4"
]
ml = [
  "torch>=2.0",
  "rdkit>=2023.9"
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra"
