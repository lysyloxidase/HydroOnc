[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "hydroonc-tumor-ph"
version = "0.1.0"
description = "Phase 3 tumor microenvironment pH modeling for HydroOnc: Warburg dynamics, reaction-diffusion, and CEST-ML mapping."
readme = "README.md"
requires-python = ">=3.9"
license = { text = "MIT" }
authors = [
  { name = "HydroOnc Contributors" }
]
dependencies = [
  "numpy>=1.23"
]

[project.optional-dependencies]
dev = [
  "pytest>=7.4"
]
fenics = [
  "fenics-dolfinx>=0.7"
]
ml = [
  "jax>=0.4",
  "deepxde>=1.10"
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra"
